name = "sports-scores"
main = "src/index.js"
compatibility_date = "2026-06-01"

# Free tier: Cache API only (no KV/DO writes — they'd blow the free write quota
# at a 15s refresh; see schema/SCHEMA.md §6). No compatibility_flags
# needed because we deliberately avoid node builtins in the worker bundle.

[observability]
enabled = true

# Custom domain — the app's baked default origin (app/lib/src/config.dart
# `defaultBaseUrl` = https://api.scores.philco.dev). A sideloaded APK can't be
# force-migrated, so this hostname is effectively permanent once a build ships.
# `philco.dev` is an active Cloudflare zone on this account, so deploying this
# route creates the custom domain + its proxied DNS record automatically. A
# custom domain also lets you add Cache Rules so repeat edge hits skip the worker
# entirely (saves the 100k/day request budget).
[[routes]]
pattern = "api.scores.philco.dev"
custom_domain = true
