name: scores
description: A fast, calm, glanceable multi-sport scores app.
publish_to: "none"
version: 0.2.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  # §2.9 Circuit tab: ESPN serves the F1 `circuit-dark` track map as SVG only
  # (no dark raster variant). flutter_svg is the one justified new dep — a
  # well-maintained package — to render `SvgPicture.network` for that map. Raster
  # (.jpg) diagram rels are preferred first; SVG is the fallback the dep covers.
  flutter_svg: ^2.0.10
  http: ^1.2.2
  shared_preferences: ^2.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_lints: ^4.0.0
  # Fans the generated icon art (assets/icon/, drawn by tool/gen_app_icon.dart
  # from the design tokens) out to the Android mipmaps/adaptive icon + web icons:
  # `dart run flutter_launcher_icons`.
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  image_path: assets/icon/icon.png
  adaptive_icon_background: "#111318"
  adaptive_icon_foreground: assets/icon/icon_foreground.png
  # Android 13+ themed icon: alpha of the foreground mark.
  adaptive_icon_monochrome: assets/icon/icon_foreground.png
  web:
    generate: true
    image_path: assets/icon/icon.png
    background_color: "#111318"
    theme_color: "#111318"

flutter:
  uses-material-design: true

  assets:
    # The locked data model (schema/league-profiles.json). Bundled so the app
    # resolves league profiles + builds the catalog on-device — no worker. Kept
    # byte-identical to the schema source by tool/sync_registry via a guard test
    # (test/registry_sync_test.dart). Edit schema/league-profiles.json, then run
    # `dart run tool/sync_registry.dart` (or `node ../schema/tools/... ` sync).
    - assets/league-profiles.json

  fonts:
    # Scoreboard voice — team names, scores, clocks, stat numbers.
    - family: BarlowCondensed
      fonts:
        - asset: assets/fonts/BarlowCondensed-Medium.ttf
          weight: 500
        - asset: assets/fonts/BarlowCondensed-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/BarlowCondensed-Bold.ttf
          weight: 700
    # Copy voice — labels, body text, buttons.
    - family: Archivo
      fonts:
        - asset: assets/fonts/Archivo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Archivo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Archivo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Archivo-Bold.ttf
          weight: 700
