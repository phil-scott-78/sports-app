name: scores
description: A fast, calm, glanceable multi-sport scores app.
publish_to: "none"
version: 0.2.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  http: ^1.2.2
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  # Opens the GitHub Releases page from the update banner (a sideloaded APK can't
  # self-update, so the worker can only signal + deep-link). See ui/update_banner.dart.
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  fonts:
    # BinanceNova substitute — all copy, labels, headlines.
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    # BinancePlex substitute — every number (scores, stats, clocks).
    - family: IBMPlexSans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Variable.ttf
